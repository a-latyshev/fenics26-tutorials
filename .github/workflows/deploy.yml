# This file was created automatically with `jupyter-book init --gh-pages` 🪄 💚
# Ensure your GitHub Pages settings for this repository are set to deploy with **GitHub Actions**.

name: Jupyter Book (via myst) GitHub Pages Deploy
on:
  push:
    branches: ["**"]
env:
  # `BASE_URL` determines, relative to the root of the domain, the URL that your site is served from.
  # E.g., if your site lives at `https://mydomain.org/myproject`, set `BASE_URL=/myproject`.
  # If, instead, your site lives at the root of the domain, at `https://mydomain.org`, set `BASE_URL=''`.
  BASE_URL: /${{ github.event.repository.name }}

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: 'pages'
  cancel-in-progress: false
jobs:
  build:
    runs-on: ubuntu-latest
    container: ghcr.io/fenics/dolfinx/lab:nightly
    env:
      HOST: "127.0.0.1"
      # CI runners are headless; force PyVista/VTK to avoid X-backed windows.
      PYVISTA_OFF_SCREEN: true
      PYVISTA_JUPYTER_BACKEND: html
      JUPYTER_EXTENSION_ENABLED: true
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 18.x
      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt
      - name: Install system dependencies for headless rendering
        run: |
          apt-get update
          apt-get install -y --no-install-recommends xvfb
      - name: Convert Jupytext .py files to notebooks
        run: |
          jupytext --to ipynb session*/*.py
      - name: Execute python files to make pyvista HTML files
        run: |
          jupyter nbconvert --inplace --clear-output --execute session*/*.ipynb
      - name: Build HTML Assets
        run: |
          jupyter book build --html --execute
      - name: Copy across pyvista html
        run: |
          mkdir -p _build/html/pyvista
          cp session*/pyvista_*.html _build/html/pyvista/
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        id: deployment
        with:
          path: ./_build/html

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main'
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
