# This file was created automatically with `jupyter-book init --gh-pages` 🪄 💚
# Ensure your GitHub Pages settings for this repository are set to deploy with **GitHub Actions**.

name: Jupyter Book (via myst) GitHub Pages Deploy
on:
  push:
    # Runs on pushes targeting the default branch
    branches: [main]
env:
  # `BASE_URL` determines, relative to the root of the domain, the URL that your site is served from.
  # E.g., if your site lives at `https://mydomain.org/myproject`, set `BASE_URL=/myproject`.
  # If, instead, your site lives at the root of the domain, at `https://mydomain.org`, set `BASE_URL=''`.
  BASE_URL: /${{ github.event.repository.name }}

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write
# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: 'pages'
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    container: ghcr.io/fenics/dolfinx/lab:v0.10.0
    env:
      HOST: "127.0.0.1"
      # CI runners are headless; force PyVista/VTK to avoid X-backed windows.
      PYVISTA_OFF_SCREEN: true
      PYVISTA_JUPYTER_BACKEND: html
      JUPYTER_EXTENSION_ENABLED: true
    steps:
      - uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v3
      - uses: actions/setup-node@v4
        with:
          node-version: 18.x
      # - name: Install Jupyter Book (via myst)
      #   run: npm install -g jupyter-book
      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt
      - name: Install system dependencies for headless rendering
        run: |
          apt-get update
          apt-get install -y --no-install-recommends xvfb
      - name: Convert tutorial Jupytext .py files to notebooks
        run: |
          find jb2_playground -type f -name "*.py" -print0 | xargs -0 -I {} jupytext --from py --to notebook "{}"
      - name: Execute notebooks (headless)
        shell: bash
        run: |
          set -euo pipefail
          while IFS= read -r -d '' nb; do
            # Execute in-place; clear outputs to keep artifacts small.
            # Run under Xvfb so any VTK/PyVista rendering code has a DISPLAY.
            xvfb-run -a jupyter nbconvert \
              --execute \
              --to notebook \
              --inplace \
              --clear-output \
              --log-level=WARN \
              "$nb"
          done < <(
            find jb2_playground -type f -name "*.ipynb" \
              -not -path "./_build/*" \
              -not -path "./.git/*" \
              -not -path "./site_exports/*" \
              -print0
          )
      - name: Build HTML Assets
        run: |
          jupyter book build --html
      - name: Copy PyVista HTML exports into website
        shell: bash
        run: |
          mkdir -p _build/html/pyvista
          # Copy standalone HTML exports created during notebook execution.
          # Tutorial code exports plain filenames (no fixed export directory),
          # so we gather any *.html files from the source tree while excluding
          # the built site itself.

          # Source tree (exclude _build/ entirely to avoid copying the built site)
          while IFS= read -r -d '' f; do
            cp -v "$f" "_build/html/pyvista/$(basename "$f")" || true
          done < <(
            find . -type f -name "*.html" \
              -not -path "./_build/*" \
              -not -path "./.git/*" \
              -not -path "./site_exports/*" \
              -print0
          )
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './_build/html'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
